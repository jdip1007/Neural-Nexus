name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  ensure-pages-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure Pages build_type is workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT=$(gh api repos/{owner}/{repo}/pages --jq .build_type 2>/dev/null || echo "")
          if [ "$CURRENT" != "workflow" ]; then
            echo "Pages build_type is '$CURRENT' — switching to 'workflow'"
            gh api repos/{owner}/{repo}/pages -X PUT -f build_type=workflow || true
          else
            echo "Pages build_type already 'workflow' — OK"
          fi

  build:
    runs-on: ubuntu-latest
    needs: ensure-pages-workflow
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Lint wiki (fail on errors)
        run: node scripts/lint-wiki.js

      - name: Build knowledge graph
        run: node scripts/build-graph.js

      - name: Generate catalog
        run: node scripts/generate-catalog.js

      - name: Build MkDocs site
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4