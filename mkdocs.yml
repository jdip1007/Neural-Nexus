site_name: Neural Nexus
site_description: Personal knowledge base — LLM Wiki + Obsidian, hosted on GitHub Pages
site_author: jdip1007
site_url: https://jdip1007.github.io/Neural-Nexus

repo_name: jdip1007/Neural-Nexus
repo_url: https://github.com/jdip1007/Neural-Nexus

nav:
  - Home: index.md
  - Concepts:
    - neural-nexus.md: concepts/neural-nexus.md
  - References:
    - setup-guide.md: references/setup-guide.md
    - writing-guide.md: references/writing-guide.md
  - Knowledge Graph: graph.md
  - Schema: SCHEMA.md
  - Extra Pages:
    - Tags: tags.md
    - Log: log.md
    - Index Catalog: index-catalog.md

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - toc.follow
    - content.code.copy
    - content.tabs.link

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Inter
    code: JetBrains Mono

  icon:
    logo: material/brain

plugins:
  - search:
      lang: en
  - awesome-pages
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: date

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jdip1007/Neural-Nexus
  generator: false

extra_css:
  - css/custom.css

extra_javascript:
  - https://d3js.org/d3.v7.min.js
  - js/graph-render.js