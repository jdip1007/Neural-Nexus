    - cell-line-culture.md: concepts/cell-line-culture.md
    - dna-extraction-methodologies.md: concepts/dna-extraction-methodologies.md
    - tissue-specific-dna-extraction.md: concepts/tissue-specific-dna-extraction.md
    - nanopore-sequencing.md: concepts/nanopore-sequencing.md
    - environmental-dna-analysis.md: concepts/environmental-dna-analysis.md
    - adaptive-sampling.md: concepts/adaptive-sampling.md
    - knowledge-preservation.md: concepts/knowledge-preservation.md
    - reproducibility-crisis.md: concepts/reproducibility-crisis.md
  - Entities:
    - penn-rainford.md: entities/penn-rainford.md
  - Findings:
    - centrifuge-layer-extraction-bacterial-dna.md: findings/centrifuge-layer-extraction-bacterial-dna.md
    - knowledge-preservation-ai-integration-insights.md: findings/knowledge-preservation-ai-integration-insights.md
  - Readings:
    - cell-line-dna-pure-extraction-method.md: readings/cell-line-dna-pure-extraction-method.md
    - cell-line-dna-qgn-extraction-method.md: readings/cell-line-dna-qgn-extraction-method.md
    - agarose-plug-dna-extraction-method.md: readings/agarose-plug-dna-extraction-method.md
    - brain-tissue-dna-extraction-method.md: readings/brain-tissue-dna-extraction-method.md
    - colony-pcr-dna-extraction-method.md: readings/colony-pcr-dna-extraction-method.md
    - environmental-water-edna-extraction-method.md: readings/environmental-water-edna-extraction-method.md
    - cell-free-dna-cfdna-info-sheet.md: readings/cell-free-dna-cfdna-info-sheet.md
    - 24hr-genome-e2e-promethion-document.md: readings/24hr-genome-e2e-promethion-document.md
    - adaptive-sampling-document.md: readings/adaptive-sampling-document.md
    - knowledge-preservation-big-science-ai-rainford-et-al-2026.md: readings/knowledge-preservation-big-science-ai-rainford-et-al-2026.md
  - References:
    - setup-guide.md: references/setup-guide.md
    - writing-guide.md: references/writing-guide.md
  - Knowledge Graph: graph.md
  - Schema: SCHEMA.md
  - Extra Pages:
    - Tags: tags.md
    - Log: log.md
    - Index Catalog: index-catalog.md

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - toc.follow
    - content.code.copy
    - content.tabs.link

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Inter
    code: JetBrains Mono

  icon:
    logo: material/brain

plugins:
  - search:
      lang: en
  - awesome-pages
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - path: wikilinks_plugin.py

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jdip1007/Neural-Nexus
  generator: false

extra_css:
  - css/custom.css

extra_javascript:
  - https://d3js.org/d3.v7.min.js
  - js/graph-render.js